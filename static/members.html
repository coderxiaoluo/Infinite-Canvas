<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>管理后台 · AI Studio</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.06.22.1782120241"></script>
    <script src="/static/vendor/js/lucide.js?v=2026.06.22.1782120241"></script>
    <script src="/static/js/theme.js?v=2026.06.22.1782120241"></script>
    <script src="/static/js/auth.js?v=2026.06.22.1782185329"></script>
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.06.22.1782120241">
    <link rel="stylesheet" href="/static/css/members.css?v=2026.06.22.1782184156">
</head>
<body class="admin-page">

    <div class="page">

        <header class="page-head">
            <div class="page-head-main">
                <div class="title">管理后台</div>
                <div class="sub">主账号专属 · 管理子账号、API 配置与系统资源</div>
            </div>
            <div class="page-head-actions">
                <button class="btn-ghost" type="button" onclick="location.href='/'">返回首页</button>
            </div>
        </header>

        <nav class="admin-tabs" aria-label="管理后台导航">
            <a class="admin-tab active" href="/members.html" aria-current="page">子账号管理</a>
            <a class="admin-tab" href="/api-settings.html">API 配置</a>
        </nav>

        <div class="admin-card">

            <section class="section-create">
                <div class="section-head">
                    <div>
                        <div class="section-title">添加子账号</div>
                        <div class="section-desc">创建后可立即使用，子账号仅可操作自己的画布与任务</div>
                    </div>
                </div>

                <form id="create-form" class="form-grid">
                    <div>
                        <label for="new-username">账号</label>
                        <input id="new-username" required placeholder="4 位以上字母或数字" autocomplete="off" maxlength="80">
                        <div class="field-msg" id="username-msg"></div>
                    </div>
                    <div>
                        <label for="new-password">初始密码</label>
                        <input id="new-password" type="password" required placeholder="至少 6 位，建议含字母" autocomplete="new-password">
                        <div class="field-msg" id="password-msg"></div>
                    </div>
                    <div>
                        <label for="new-role">权限</label>
                        <select id="new-role">
                            <option value="editor">编辑者（可操作自己的画布与任务）</option>
                            <option value="viewer">只读（仅查看自己的内容）</option>
                        </select>
                    </div>
                    <div class="form-submit-cell">
                        <button class="btn-primary" type="submit">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                            创建
                        </button>
                    </div>
                </form>

                <div class="section-foot">子账号无法访问本页、无法管理其他账号，也无法修改 API 配置。</div>
                <div class="form-error" id="form-error"></div>
            </section>

            <section class="table-section">
                <div class="table-toolbar">
                    <div class="section-title">子账号列表<span class="count-badge" id="member-count" hidden>0</span></div>
                </div>
                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>账号</th>
                                <th>权限</th>
                                <th>状态</th>
                                <th>最近登录</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="member-rows">
                            <tr class="empty-row"><td colspan="5">加载中…</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </div>

    </div>

    <!-- 通用确认弹窗 -->
    <div class="modal-overlay" id="modal-confirm" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-title" id="modal-confirm-title">确认</div>
            <div class="modal-body" id="modal-confirm-body"></div>
            <div class="modal-actions">
                <button class="btn-ghost" type="button" id="modal-confirm-cancel">取消</button>
                <button class="btn-primary" type="button" id="modal-confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <!-- 弱密码提醒 -->
    <div class="modal-overlay" id="modal-weak-pwd" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-title">密码强度较弱</div>
            <div class="modal-body warn" id="modal-weak-pwd-body"></div>
            <div class="modal-actions">
                <button class="btn-ghost" type="button" id="modal-weak-pwd-back">返回修改</button>
                <button class="btn-primary" type="button" id="modal-weak-pwd-continue">仍要继续</button>
            </div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="modal-reset-pwd" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-title">修改密码</div>
            <div class="modal-body" id="modal-reset-pwd-hint">为子账号设置新密码</div>
            <div class="modal-field">
                <label for="reset-pwd-input">新密码</label>
                <input id="reset-pwd-input" type="password" placeholder="至少 6 位，建议含字母" autocomplete="new-password">
                <div class="field-msg error" id="reset-pwd-error"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" type="button" id="modal-reset-pwd-cancel">取消</button>
                <button class="btn-primary" type="button" id="modal-reset-pwd-ok">确定</button>
            </div>
        </div>
    </div>

    <script src="/static/js/members.js?v=2026.06.22.1782184242"></script>
</body>
</html>
