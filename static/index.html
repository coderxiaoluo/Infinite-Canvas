    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
                document.documentElement.classList.add('studio-route-booting');
            } catch(e) {}
        })();
    </script>

    <style>
        @import url('/static/vendor/css/fonts.css?v=2026.06.22.1782120241');

        /* 本地 Tailwind 工具类兜底：CDN 慢/未就绪时也能立刻给图标尺寸，避免首屏左侧栏空白 */
        .w-1\.5 { width: 0.375rem; }
        .h-1\.5 { height: 0.375rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .flex-shrink-0 { flex-shrink: 0; }
        .rounded-full { border-radius: 9999px; }
        .mb-12 { margin-bottom: 3rem; }
        .transition-colors { transition-property: color, background-color, border-color, fill, stroke; transition-duration: 150ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse { animation: studio-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes studio-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        :root {
            --accent: #000000;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #ffffff;
            --sidebar-bg: #ffffff;
            --stage-bg: #fcfcfc;
            --border: #f2f2f2;
            --stage-border: #f0f0f0;
            --text: #121212;
            --muted: #999;
            --nav-hover-bg: #fafafa;
            --monitor-bg: rgba(255, 255, 255, 0.7);
            --monitor-border: rgba(0, 0, 0, 0.05);
            --monitor-shadow: rgba(0, 0, 0, 0.04);
            --divider: rgba(0, 0, 0, 0.1);
            --scrollbar: #d8d8d8;
            --scrollbar-hover: #c0c0c0;
            --author-name: #000;
            --social-icon: #ccc;
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #050508;
            --sidebar-bg: #050508;
            --stage-bg: #050508;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --monitor-bg: rgba(23, 29, 41, 0.82);
            --monitor-border: rgba(255, 255, 255, 0.08);
            --monitor-shadow: rgba(0, 0, 0, 0.3);
            --divider: rgba(255, 255, 255, 0.15);
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
            --author-name: #e5e9f0;
            --social-icon: #64748b;
        }

        /* 极简滚动条 */
        html,
        body {
            overscroll-behavior: auto;
            height: 100%;
            overflow: hidden;
        }

        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 3px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
            min-height: 36px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 顶部导航 */
        .studio-header {
            flex: 0 0 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 0 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            z-index: 50;
            gap: 16px;
        }

        .studio-header-left {
            display: flex;
            align-items: center;
            gap: 28px;
            min-width: 0;
            flex: 1;
        }

        .studio-brand {
            flex: 0 0 auto;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 4px 0;
        }

        .studio-brand-inner {
            position: relative;
            display: flex;
            align-items: baseline;
            gap: 6px;
            line-height: 1;
        }

        .studio-brand-inner::before {
            content: "";
            position: absolute;
            inset: -8px -12px;
            border-radius: 12px;
            background: radial-gradient(circle at 50% 50%, rgba(255, 107, 203, .16), rgba(116, 192, 252, .1), transparent 72%);
            filter: blur(8px);
            opacity: .5;
            animation: studio-logo-glow 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .studio-logo-ai,
        .studio-logo-canvas {
            position: relative;
            z-index: 1;
            font-weight: 900;
            letter-spacing: .12em;
            text-transform: uppercase;
            background: linear-gradient(120deg, #ff6bcb 0%, #ffa94d 18%, #ffd43b 32%, #69db7c 48%, #74c0fc 64%, #da77f2 82%, #ff6bcb 100%);
            background-size: 320% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: studio-logo-flow 7s linear infinite;
        }

        .studio-logo-ai { font-size: 15px; }
        .studio-logo-canvas { font-size: 15px; letter-spacing: .18em; }

        @keyframes studio-logo-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 320% 50%; }
        }

        @keyframes studio-logo-glow {
            0% { opacity: .35; transform: scale(.96); }
            100% { opacity: .72; transform: scale(1.04); }
        }

        html.theme-dark .studio-brand-inner::before,
        body.theme-dark .studio-brand-inner::before { opacity: .38; }

        .studio-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .studio-nav::-webkit-scrollbar { display: none; }

        .studio-nav-item {
            flex: 0 0 auto;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border: none;
            background: transparent;
            white-space: nowrap;
            font-family: inherit;
            transition: color 0.15s, background 0.15s;
        }

        .studio-nav-item:hover {
            color: var(--text);
            background: var(--nav-hover-bg);
        }

        .studio-nav-item.active {
            background: var(--text);
            color: var(--bg);
        }

        html.theme-dark .studio-nav-item.active,
        body.theme-dark .studio-nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .studio-nav-dropdown {
            position: relative;
            flex: 0 0 auto;
        }

        .studio-nav-dropdown-trigger {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .dropdown-chevron {
            width: 14px;
            height: 14px;
            opacity: .6;
            transition: transform .2s;
        }

        .studio-nav-dropdown.is-open .dropdown-chevron {
            transform: rotate(180deg);
        }

        .studio-nav-dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 160px;
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            box-shadow: 0 12px 40px rgba(0,0,0,.25);
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 60;
        }

        .studio-nav-dropdown.is-open .studio-nav-dropdown-menu {
            display: flex;
        }

        .studio-nav-dropdown-item {
            border: none;
            background: transparent;
            text-align: left;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            font-family: inherit;
            transition: background .15s, color .15s;
        }

        .studio-nav-dropdown-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .studio-nav-dropdown-item.active {
            background: var(--text);
            color: var(--bg);
        }

        html.theme-dark .studio-nav-dropdown-item.active,
        body.theme-dark .studio-nav-dropdown-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .studio-header-right {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
        }

        .header-icon-btn:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .header-icon-btn.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .header-icon-btn svg { width: 16px; height: 16px; }

        .auth-user-box {
            display: none;
            margin-left: 4px;
        }
        .auth-user-box.is-auth-ready { display: block; }
        .auth-user-box .auth-user-menu-trigger { max-width: 180px; }

        @media (max-width: 900px) {
            .studio-header { padding: 0 12px; }
            .studio-header-left { gap: 12px; }
            .studio-nav-item { padding: 7px 10px; font-size: 12px; }
        }

        /* 主舞台区 */
        .stage {
            flex: 1;
            min-height: 0;
            background: var(--stage-bg);
            margin: 0;
            border-radius: 0;
            overflow: hidden;
            border: none;
            position: relative;
            transition: background 0.3s;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 左下角监视器 */
        .nano-monitor {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--monitor-bg);
            backdrop-filter: blur(12px);
            padding: 7px 12px;
            border-radius: 12px;
            border: 1px solid var(--monitor-border);
            box-shadow: 0 4px 20px var(--monitor-shadow);
            font-family: monospace;
            transition: all 0.4s var(--fluid-ease);
        }

        .nano-monitor.is-busy {
            background: #000;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-group:first-child {
            gap: 8px;
        }

        .nano-monitor.is-busy .stat-group {
            color: #fff;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(255, 255, 255, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 2px;
            flex: 0 0 auto;
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

</style>
</head>

        <script>
            (function(){
                try {
                    var cached = null;
                    try { cached = JSON.parse(localStorage.getItem('ic_user_cache') || 'null'); } catch(e) {}
                    var isOwner = !cached || cached.account_type === 'owner' || cached.role === 'owner';
                    var allowedMember = ['home','online','gpt-chat','canvas','asset-manager'];
                    var pageId = localStorage.getItem('studio_active_page');
                    if (!isOwner) {
                        if (!pageId || ['zimage','enhance','klein','angle','api-settings','comfyui-settings'].indexOf(pageId) >= 0) {
                            pageId = allowedMember.indexOf(pageId) >= 0 ? pageId : 'home';
                        }
                    }
                    if (!pageId) pageId = 'home';
                    document.querySelectorAll('.studio-nav-item.active, .studio-nav-dropdown-item.active, .header-icon-btn.active').forEach(function(n){
                        n.classList.remove('active');
                    });
                    var target = document.querySelector('[data-page="' + pageId + '"]');
                    if (target) target.classList.add('active');
                    if (['zimage','enhance','klein','angle'].indexOf(pageId) >= 0) {
                        var trig = document.getElementById('local-nav-toggle');
                        if (trig) trig.classList.add('active');
                    }
                    var frame = document.getElementById('frame-' + pageId);
                    if (frame) {
                        document.querySelectorAll('iframe').forEach(function(f){ f.classList.remove('active'); });
                        frame.classList.add('active');
                    }
                } catch(e) {}
            })();
        </script>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);
        const ACTIVE_PAGE_KEY = 'studio_active_page';
        const LOCAL_NAV_COLLAPSED_KEY = 'studio_local_nav_collapsed';
        const SIDEBAR_SETTINGS_COLLAPSED_KEY = 'studio_sidebar_settings_collapsed';
        const SIDEBAR_PINNED_KEY = 'studio_sidebar_pinned';
        const DEFAULT_PAGE_ID = 'home';
        const MEMBER_DEFAULT_PAGE_ID = 'home';
        const OWNER_ONLY_PAGE_IDS = ['zimage','enhance','klein','angle','api-settings','comfyui-settings'];
        const PAGE_IDS = ['home','zimage','enhance','klein','angle','online','gpt-chat','canvas','asset-manager','api-settings','comfyui-settings'];
        const LOCAL_PAGE_IDS = ['zimage','enhance','klein','angle'];
        let studioIsOwner = true;

        function resolveStudioIsOwner(user, mePayload) {
            if (window.StudioAuth && typeof window.StudioAuth.userIsOwner === 'function') {
                if (window.StudioAuth.userIsOwner(user)) return true;
            }
            if (mePayload && mePayload.is_owner === true) return true;
            return false;
        }

        function canAccessPage(id) {
            return studioIsOwner || !OWNER_ONLY_PAGE_IDS.includes(id);
        }

        function defaultPageId() {
            return studioIsOwner ? DEFAULT_PAGE_ID : MEMBER_DEFAULT_PAGE_ID;
        }

        function applyHeaderPermissions(isOwner) {
            studioIsOwner = !!isOwner;
            document.querySelectorAll('.owner-only').forEach(function(el) {
                el.style.display = studioIsOwner ? '' : 'none';
            });
        }
        function applySidebarPermissions(isOwner) { applyHeaderPermissions(isOwner); }

        function denyPageAccess(id) {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            alert(isEn ? 'Your account does not have access to this page.' : '当前账号无权访问此页面');
            return MEMBER_DEFAULT_PAGE_ID;
        }

        function closeLocalDropdown() {
            const dd = document.getElementById('owner-local-nav-section');
            if (dd) dd.classList.remove('is-open');
            document.getElementById('local-nav-toggle')?.setAttribute('aria-expanded', 'false');
        }

        function toggleLocalDropdown(event) {
            if (event) event.stopPropagation();
            const dd = document.getElementById('owner-local-nav-section');
            if (!dd) return;
            const open = dd.classList.toggle('is-open');
            document.getElementById('local-nav-toggle')?.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        document.addEventListener('click', function(e) {
            const dd = document.getElementById('owner-local-nav-section');
            if (dd && dd.classList.contains('is-open') && !dd.contains(e.target)) closeLocalDropdown();
        });

        function resetStudioRootScroll() {
            try {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            } catch(e) {}
        }

        function switchUI(el, id, options = {}) {
            resetStudioRootScroll();
            if(!PAGE_IDS.includes(id)) id = defaultPageId();
            if(!canAccessPage(id)) {
                id = denyPageAccess(id);
                el = document.querySelector(`[data-page="${id}"]`);
                options = { ...options, skipRemember: false };
            }
            document.querySelectorAll('.studio-nav-item, .studio-nav-dropdown-item, .header-icon-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('local-nav-toggle')?.classList.remove('active');
            if(el) el.classList.add('active');
            if(LOCAL_PAGE_IDS.includes(id)) document.getElementById('local-nav-toggle')?.classList.add('active');
            closeLocalDropdown();
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const target = document.getElementById('frame-' + id);
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            if(!options.skipRemember) localStorage.setItem(ACTIVE_PAGE_KEY, id);
            // sync theme to newly activated iframe
            syncThemeToFrame(target);
            syncLanguageToFrame(target);
// 切换到画布时通知刷新工作流列表（防止在 comfyui-settings 修改后画布未及时更新）
            if (id === 'canvas' && target.src) {
                try { target.contentWindow?.postMessage({ type: 'canvas-focus' }, '*'); } catch(e) {}
            }
            resetStudioRootScroll();
        }

        window.switchUI = switchUI;

        function forwardStudioApiChange(data) {
            if(!data || !['providers-changed','workflows-changed','comfy-instances-changed'].includes(data.type)) return;
            document.querySelectorAll('iframe').forEach(iframe => {
                try {
                    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(data, '*');
                } catch(e) {}
            });
        }

        window.addEventListener('message', event => {
            if (event.origin && event.origin !== location.origin) return;
            if (event.data?.type === 'studio-forbidden-page') {
                switchUI(document.querySelector('[data-page="home"]'), 'home');
                return;
            }
            forwardStudioApiChange(event.data);
        });

        try {
            const studioApiChannel = new BroadcastChannel('studio-api');
            studioApiChannel.onmessage = event => forwardStudioApiChange(event.data);
        } catch(e) {}

        function restoreActivePage() {
            let id = PAGE_IDS.includes(localStorage.getItem(ACTIVE_PAGE_KEY)) ? localStorage.getItem(ACTIVE_PAGE_KEY) : defaultPageId();
            if(!canAccessPage(id)) id = MEMBER_DEFAULT_PAGE_ID;
            const trigger = document.querySelector(`[data-page="${id}"]`);
            switchUI(trigger, id, { skipRemember:true });
            document.documentElement.classList.remove('studio-route-booting');
        }

        async function initStudioNavigation(authResult) {
            let isOwner = true;
            if (window.StudioAuth) {
                try {
                    const status = await window.StudioAuth.getStatus(false);
                    if (status.auth_required && authResult?.ok) {
                        const me = authResult.me || await window.StudioAuth.fetchMe().catch(() => ({}));
                        const cached = window.StudioAuth.getCachedUser?.();
                        isOwner = resolveStudioIsOwner(authResult.user || me.user || cached, me);
                    } else if (status.auth_required) {
                        const cached = window.StudioAuth.getCachedUser?.();
                        isOwner = resolveStudioIsOwner(cached, null);
                    }
                } catch (e) {}
            }
            applySidebarPermissions(isOwner);
            restoreActivePage();
        }

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor?.classList.add('is-busy');
                    if (queueVal) queueVal.innerText = `${pos}/${total}`;
                } else {
                    monitor?.classList.remove('is-busy');
                    if (queueVal) queueVal.innerText = total > 0 ? total : '0';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    const ov = document.getElementById('online-val');
                    if (ov) ov.innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'canvas_updated') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'asset_library_updated') {
                    document.querySelectorAll('iframe').forEach(iframe => {
                        if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(data, '*');
                    });
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 夜间模式 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'light';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        function toggleLanguage() {
            if(!window.StudioI18n) return;
            window.StudioI18n.toggle();
            document.querySelectorAll('iframe').forEach(frame => syncLanguageToFrame(frame));
        }

        function syncLanguageToFrame(frame) {
            if(!window.StudioI18n) return;
            try {
                frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
            } catch(e) {}
        }

        function broadcastLanguage() {
            document.querySelectorAll('iframe').forEach(frame => {
                try {
                    frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
                } catch(e) {}
            });
        }

        // listen for theme changes triggered by theme.js
        window.addEventListener('studio-theme-change', (e) => {
            updateThemeIcon(e.detail.theme);
        });

        // init icon state on load
        window.addEventListener('DOMContentLoaded', () => {
            const theme = window.StudioTheme ? window.StudioTheme.get() : 'light';
            updateThemeIcon(theme);
            if(window.StudioI18n) window.StudioI18n.apply();
            broadcastLanguage();
        });

        // sync theme when iframe loads
        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => {
                syncThemeToFrame(f);
                syncLanguageToFrame(f);
            });
        });

    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!window.StudioAuth) {
                initStudioNavigation({ ok: true, required: false });
                return;
            }
            window.StudioAuth.initPage({
                onReady: async function (result) {
                    await initStudioNavigation(result);
                    if (result.required && result.ok) {
                        window.StudioAuth.initUserMenus();
                    }
                }
            });
        });
    </script>
</body>

</html>
